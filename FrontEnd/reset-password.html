<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | LearnHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-body split" data-page="reset-password">

    <div class="split-wrapper">
        <!-- LEFT SIDE CONTENT -->
        <div class="auth-side">
            <div class="auth-side-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>LearnHub</span>
            </div>
            <h2>Secure your account.</h2>
            <p>Choose a strong, unique password to keep your account safe and continue your journey.</p>
        </div>

        <!-- RIGHT SIDE FORM -->
        <div class="auth-form-side">
            <div class="auth-card">
                <div class="auth-panel active">
                    <h1 class="auth-title">Set New Password</h1>
                    <p class="auth-subtitle">Create a new password for your account.</p>

                    <form class="auth-form">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required>

                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>

                        <button type="submit" class="auth-submit">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
