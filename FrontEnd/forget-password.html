<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | LearnHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-body split" data-page="forget-password">

    <div class="split-wrapper">
        <!-- LEFT SIDE CONTENT -->
        <div class="auth-side">
            <div class="auth-side-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>LearnHub</span>
            </div>
            <h2>Recover your account access.</h2>
            <p>Enter your email address to receive a secure link to reset your password and get back to learning.</p>
        </div>

        <!-- RIGHT SIDE FORM -->
        <div class="auth-form-side">
            <div class="auth-card">
                <div class="auth-panel active">
                    <h1 class="auth-title">Forgot Password</h1>
                    <p class="auth-subtitle">Enter your email to reset your password.</p>

                    <form class="auth-form">
                        <label for="recoveryEmail">Email Address</label>
                        <input type="email" id="recoveryEmail" placeholder="you@example.com" required>

                        <button type="submit" class="auth-submit">Send Reset Link</button>
                    </form>

                    <p class="auth-footer-text">Remembered your password? <a href="stu-login.html">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
