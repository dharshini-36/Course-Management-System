<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LearnHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body" data-page="login-choice">

    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="choice-wrapper">

        <div class="choice-header">
            <div class="choice-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>LearnHub</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Choose how you'd like to continue</p>
        </div>

        <div class="choice-cards">

            <!-- STUDENT CARD -->
            <div class="choice-card">
                <div class="choice-card-icon">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <h2>Student</h2>
                <p>Access your courses, track your progress and continue learning.</p>
                <div class="choice-card-btns">
                    <a href="stu-login.html" class="choice-btn-primary">
                        <i class="fa-solid fa-right-to-bracket"></i> Student Login
                    </a>
                    <a href="stu-register.html" class="choice-btn-secondary">
                        <i class="fa-solid fa-user-plus"></i> Student Registration
                    </a>
                </div>
            </div>

            <!-- ADMIN CARD -->
            <div class="choice-card">
                <div class="choice-card-icon choice-card-icon--admin">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2>Admin</h2>
                <p>Manage courses, students and platform settings from your dashboard.</p>
                <div class="choice-card-btns">
                    <a href="admin-login.html" class="choice-btn-primary">
                        <i class="fa-solid fa-right-to-bracket"></i> Admin Login
                    </a>

                </div>
            </div>

        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
